name: Build and test PR

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f #v6.0.1

      - name: Build and test (all modules)
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test (all modules that define it)
        run: ./gradlew integrationTest --tests '*IntegrationTest'

      - name: Test coverage verification (all modules that define it)
        run: ./gradlew jacocoTestCoverageVerification

      - name: Publish package (all publishing-enabled modules)
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checkstyle reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: checkstyle-reports
          path: "**/build/reports/checkstyle/**"
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          retention-days: 14

      - name: Upload jacoco coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: jacoco-coverage-reports
          path: "**/build/reports/jacoco/**"
          retention-days: 14

  run-e2e:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 #v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ministryofjustice

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ steps.generate_token.outputs.token }}" | gh auth login --with-token
          echo "REPO=ministryofjustice/claim-assess-regression-tests" >> $GITHUB_ENV

      - name: Trigger E2E workflow run
        run: |
          gh workflow run qa-ci.yml \
            --repo $REPO \
            --ref main \
            --field stubs_branch=main

      - name: Wait for E2E workflow run to start
        run: |
          while true; do
            sleep 5
            echo "----- DEBUG: Full gh run list output -----"
  
            gh run list \
              --repo "$REPO" \
              --workflow qa-ci.yml \
              --branch main \
              --limit 5 \
              --json databaseId,status,actor,event \
              --jq '.[]'
            
  
            echo "----- END DEBUG -----"
              
  
            RUN_ID=$(gh run list \
              --repo $REPO \
              --workflow qa-ci.yml \
              --branch main \
              --limit 1 \
              --json databaseId,status \
              --jq '.[0].databaseId // empty')

            if [ -n "$RUN_ID" ]; then
              echo "Found workflow run: $RUN_ID"
              echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
              break
            fi

            sleep 5
          done

      - name: Wait for E2E workflow run to finish
        run: |
          while true; do
            RUN_INFO=$(gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json status,conclusion)

            STATUS=$(echo "$RUN_INFO" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_INFO" | jq -r '.conclusion

            echo "Status: $STATUS — Conclusion: $CONCLUSION"

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" != "success" ]; then
                echo "❌ E2E tests failed."
                exit 1
              fi

              echo "✅ E2E tests passed."
              break
            fi

            sleep 10
          done

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    needs:
      - build-test
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Run Snyk to check app for vulnerabilities (whole repo)
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    runs-on: ubuntu-latest
    needs:
      - build-test
    strategy:
      fail-fast: false
      matrix:
        module:
          # Rename/add modules as your repo grows:
          - stub-civil-claims-api
          - stub-oidc-server
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f #v6.0.1

      - name: Build (all modules)
        run: ./gradlew build

      - name: Build Docker image for ${{ matrix.module }}
        run: |
          docker build --pull \
            -t ${{ matrix.module }}:scan \
            -f ${{ matrix.module }}/Dockerfile \
            ${{ matrix.module }}

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0
        with:
          image: ${{ matrix.module }}:scan
          args: --file=${{ matrix.module }}/Dockerfile --severity-threshold=high --policy-path=./.snyk
