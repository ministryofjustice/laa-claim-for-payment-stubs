name: Build and deploy after PR merged

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 #v6.1.1

      - name: Build and test
        run: ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration test
        run: ./gradlew integrationTest --tests '*IntegrationTest'

      - name: Test coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Upload test results (all modules)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: test-results
          path: |
            **/build/test-results/**
          retention-days: 14

      - name: Upload checkstyle report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: checkstyle-report
          path: |
            **/build/reports/checkstyle/**
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: test-report
          path: |
            **/build/reports/tests/**
          retention-days: 14

      - name: Upload jacoco coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: jacoco-coverage-report
          path: |
            **/build/reports/jacoco/**
          retention-days: 14

  vulnerability-report:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Setup Snyk
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 #v1.0.0

      - name: Run Snyk to check app for vulnerabilities
        run: snyk monitor --severity-threshold=high
        continue-on-error: true

      - name: Generate sarif Snyk report
        run: snyk test --sarif-file-output=snyk-app.sarif
        continue-on-error: true

      # Fix/hack for Snyk's sarif file to avoid this error uploading to GitHub.
      # See https://github.com/github/codeql-action/issues/2187 for more context.
      - name: Fix undefined values
        run: |
          sed -i 's/"security-severity": "undefined"/"security-severity": "0"/g' snyk-app.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #v4.36.2
        with:
          sarif_file: snyk-app.sarif

  ecr:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stub-civil-claims-api
            context: ./stub-civil-claims-api
            dockerfile: ./stub-civil-claims-api/Dockerfile
            ecr-repository: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY}}
            aws-region: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REGION}}
          - name: stub-oidc-server
            context: ./stub-oidc-server
            dockerfile: ./stub-oidc-server/Dockerfile
            ecr-repository: ${{ vars.STUB_OIDC_SERVER_ECR_REPOSITORY }}
            aws-region: ${{ vars.STUB_OIDC_SERVER_ECR_REGION }}
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 #v6.1.1

      - name: Build and test
        run: ./gradlew :${{ matrix.name }}:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set role variable # secrets can't be used in the matrix includes
        run: |
          if [ "${{ matrix.name }}" = "stub-civil-claims-api" ]; then
            echo "ROLE=${{ secrets.STUB_CIVIL_CLAIMS_API_ECR_ROLE_TO_ASSUME }}" >> $GITHUB_ENV
          elif [ "${{ matrix.name }}" = "stub-oidc-server" ]; then
            echo "ROLE=${{ secrets.STUB_OIDC_SERVER_ECR_ROLE_TO_ASSUME }}" >> $GITHUB_ENV
          else
            echo "Unknown matrix.name: ${{ matrix.name }}"
            exit 1
          fi

      - name: Configure AWS creds (stub-civil-claims-api)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ matrix.aws-region }}

      - name: login to registry
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 #v2.1.6
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}-${{ matrix.name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push image with local action
        uses: ./.github/actions/build_and_push
        with:
          image_registry: ${{ secrets.ECR_REGISTRY_URL }}
          image_repo: ${{ matrix.ecr-repository }}
          dockerfile_path: ${{ matrix.dockerfile }}
          build_context: ${{ matrix.context }}
          image_tag: ${{ env.IMAGE_TAG }}

  stub-civil-claims-deploy-dev:
    environment: dev
    runs-on: ubuntu-latest
    needs:
      - ecr
      - vulnerability-report
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Deploy to Development
        uses: ./.github/actions/deploy
        with:
          ecr-repository:  ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY}}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: dev
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_artifact: 'stub-civil-claims-api'

  run-e2e:
    needs: ecr
    runs-on: ubuntu-latest
    env:
      ORG: ministryofjustice
      REPO: claim-assess-regression-tests
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}
          repositories: ${{ env.REPO }}

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ steps.generate_token.outputs.token }}" | gh auth login --with-token

      - name: Trigger E2E workflow run
        run: |
          OUTPUT=$(gh workflow run qa-ci.yml --repo "$ORG/$REPO" --ref main)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo '/actions/runs/[0-9]+')
          RUN_ID="${URL##*/}"
          echo "Run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Wait for E2E workflow run to finish
        run: |
          while true; do
            OUTPUT=$(gh run view "$RUN_ID" --repo "$ORG/$REPO" --json status,conclusion)
            STATUS=$(echo "$OUTPUT" | jq -r '.status')
            CONCLUSION=$(echo "$OUTPUT" | jq -r '.conclusion')

            echo "Status: $STATUS"

            if [ "$STATUS" == "completed" ]; then
              echo "Conclusion: $CONCLUSION"
              if [ "$CONCLUSION" != "success" ]; then
                exit 1
              fi
              break
            fi

            sleep 10
          done

  stub-civil-claims-deploy-uat:
    environment: uat
    runs-on: ubuntu-latest
    needs:
      - run-e2e
      - vulnerability-report
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Deploy to UAT
        uses: ./.github/actions/deploy
        with:
          ecr-repository:  ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY}}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_artifact: 'stub-civil-claims-api'

  deploy-staging:
    environment: staging
    runs-on: ubuntu-latest
    needs:
      - run-e2e
      - vulnerability-report
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Deploy to Staging
        uses: ./.github/actions/deploy
        with:
          ecr-repository: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          department_name: ${{ vars.DEPARTMENT_NAME }}
          department_url: ${{ vars.DEPARTMENT_URL }}
          contact_email: ${{ vars.CONTACT_EMAIL }}
          service_url: ${{ vars.SERVICE_URL }}
          session_name: ${{ vars.SESSION_NAME}}
          ratelimit_headers_enabled: ${{ vars.RATELIMIT_HEADERS_ENABLED }}
          ratelimit_storage_uri: ${{ vars.RATELIMIT_STORAGE_URI }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_artifact: 'stub-civil-claims-api'
