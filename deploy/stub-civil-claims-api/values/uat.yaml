# Default values for stubs-civil-claims-api.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: "laa-claim-for-payment-stubs-sa"
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
 

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  hosts:
    - host: laa-claim-for-payment-stubs-uat.cloud-platform.service.justice.gov.uk
      paths:
        - path: /
          pathType: Prefix
  annotations:
    external-dns.alpha.kubernetes.io/set-identifier: "stubs-civil-claims-api-laa-claim-for-payment-stubs-uat-green"
    external-dns.alpha.kubernetes.io/aws-weight: "100"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60

env:
  # These will be overridden by deploy.sh with values from GitHub vars/secrets
  SERVICE_NAME: ""
  SERVICE_PHASE: ""
  DEPARTMENT_NAME: ""
  DEPARTMENT_URL: ""
  CONTACT_EMAIL: ""
  CONTACT_PHONE: ""
  SERVICE_URL: ""
  SESSION_SECRET: ""
  SESSION_NAME: ""
  RATELIMIT_HEADERS_ENABLED: ""
  RATELIMIT_STORAGE_URI: ""
  RATE_LIMIT_MAX: ""
  RATE_WINDOW_MS: ""
  ISSUER_BASE_URL:
    name: auth-secret-uat
    key: issuer-url
  AUDIENCE:
    name: auth-secret-uat
    key: application-id 
  

springProfilesActive: "uat"

postgres:
  enabled: true
  secretName: rds-postgresql-instance-output
  sslmode: "require"
  useSecretUrl: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
