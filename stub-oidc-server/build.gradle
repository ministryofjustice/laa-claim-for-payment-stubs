plugins {
    id 'io.freefair.lombok'
    id 'uk.gov.laa.springboot.laa-spring-boot-gradle-plugin'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}


jacocoTestReport {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/MockOidcApplication.class'
            ])
        }))

        executionData fileTree(dir: "$buildDir/jacoco", includes: [
            "test.exec",
            "integrationTest.exec"
        ])
    }
}

jacocoTestCoverageVerification {
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/MockOidcApplication.class'
            ])
        }))

        executionData fileTree(dir: "$buildDir/jacoco", includes: [
            "test.exec",
            "integrationTest.exec"
        ])
    }
}

sourceSets {
  main {
    java {
      srcDirs = ['src/main/java', 'generated/src/main/java']
    }
  }
}

tasks.named('checkstyleMain') {
  source = fileTree('src/main/java')
}

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-actuator'
  implementation 'org.springframework.boot:spring-boot-starter-web'
  implementation 'org.springframework.boot:spring-boot-starter-security'
  implementation 'org.springframework.security:spring-security-oauth2-authorization-server'
  implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server' // /userinfo reads JWT
  implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'              // login page
  implementation 'commons-logging:commons-logging:1.3.6'
  testImplementation 'org.springframework.boot:spring-boot-starter-test'
  testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
  testImplementation "org.springframework.security:spring-security-test"
}
